[Config]
Dependencies=initrd

[Distribution]
Distribution=ubuntu
Release=resolute
Repositories=main restricted universe multiverse

[Output]
Format=disk
Output=tinfoilcvm

[Content]
Hostname=tinfoil
Bootable=yes
Initrds=initrd
PackageDirectories=packages
RootPassword=!
Bootloader=systemd-boot
Packages=
    systemd
    systemd-boot
    ubuntu-standard
    build-essential
    kmod
    procps
    iputils-ping
    curl
    iproute2
    nano
    systemd-resolved
    ca-certificates
    nftables
    cryptsetup
    systemd-cryptsetup
    udev
    linux-generic
    linux-headers-generic
    nvidia-driver-open=595.58.03-1ubuntu1
    nvidia-persistenced=595.58.03-1ubuntu1
    nvidia-fabricmanager=595.58.03-1ubuntu1
    nvattest=1.2.0.1772475102-1
    libnvidia-nscq=595.58.03-1ubuntu1
    nvidia-container-toolkit=1.19.0-1
    docker-ce=5:29.4.1-1~ubuntu.26.04~resolute
    docker-ce-cli=5:29.4.1-1~ubuntu.26.04~resolute
    containerd.io=2.2.3-1~ubuntu.26.04~resolute

[Build]
ToolsTree=default
ToolsTreeDistribution=ubuntu
ToolsTreeRelease=resolute
WithNetwork=yes
Incremental=yes
