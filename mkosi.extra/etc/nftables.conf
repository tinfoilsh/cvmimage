#!/usr/sbin/nft -f

flush ruleset

table inet tinfoil {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback (shim ↔ upstream containers)
        iif "lo" accept

        # Established/related (return traffic for outbound connections)
        ct state established,related accept

        # ICMP/ICMPv6 (network diagnostics)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # DHCP client
        udp sport 67 udp dport 68 accept

        # Shim TLS port (always open; boot may add more via `nft add rule`)
        tcp dport 443 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy drop;

        # Loopback (shim ↔ upstream containers)
        oif "lo" accept

        # Established/related (return traffic for inbound connections)
        ct state established,related accept

        # ICMP/ICMPv6 (network diagnostics)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # DNS resolution
        udp dport 53 accept
        tcp dport 53 accept

        # DHCP client
        udp sport 68 udp dport 67 accept

        # HTTPS (registries, control plane, ACME directory)
        tcp dport 443 accept

        # HTTP (ACME http-01 challenge fetch, OCSP)
        tcp dport 80 accept
    }
}
